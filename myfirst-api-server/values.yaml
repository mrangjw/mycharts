# -----------------------------------------------
# 학습용 values.yaml
# 이 파일의 값은 templates/ 안에서 .Values.xxx 로 참조됩니다.
# -----------------------------------------------

# 사용자 ID (리소스 이름 앞에 붙는 prefix)
# 예) sk107 → sk107-myfirst-api-server
userName: "sk107"

# 파드 레플리카 수
replicaCount: 1

# 컨테이너 이미지 설정
image:
  repository: amdp-registry.skala-ai.com/skala25a  # 레지스트리/프로젝트
  name: sk107-myfirst-api-server                    # 이미지 이름
  tag: "1.0.0.spring-kaniko-kube"                    # 이미지 태그
  pullPolicy: Always

# Kubernetes Service 설정
service:
  type: ClusterIP   # ClusterIP | NodePort | LoadBalancer
  port: 8080

# Ingress 설정 (외부 접근 경로)
ingress:
  enabled: true
  className: "public-nginx"
  # 최종 host = {{ userName }}-{{ host }}
  # 예) sk107-ingress.skala25a.project.skala-ai.com
  host: "ingress.skala25a.project.skala-ai.com"
  tls:
    enabled: true
    clusterIssuer: "letsencrypt-prod"

# 리소스 요청/제한 (비워두면 미설정)
resources: {}
# resources:
#   requests:
#     cpu: 100m
#     memory: 128Mi
#   limits:
#     cpu: 500m
#     memory: 256Mi

# HPA (수평 파드 자동 스케일링)
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
