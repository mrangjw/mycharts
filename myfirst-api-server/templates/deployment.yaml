apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "myfirst-api-server.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "myfirst-api-server.labels" . | nindent 4 }}
spec:
  # autoscaling이 활성화된 경우 HPA가 replicas를 관리하므로 여기서 제외
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "myfirst-api-server.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "myfirst-api-server.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}/{{ .Values.image.name }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
          readinessProbe:
            httpGet:
              path: /
              port: http
          {{- if .Values.resources }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- end }}
